trigger: none
resources:
  repositories:
    - repository: CustomPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/OfficePipelineTemplates
      ref: refs/tags/release
  pipelines:
    - pipeline: microsoft-teams-library-js-pipeline
      source: 'microsoft-teams-library-js/M365 Platform/App SDK/OfficeDev.microsoft-teams-library-js'
      project: ISS
    - pipeline: nightlyBackCompatPipeline
      source: 'microsoft-teams-library-js/M365 Platform/App SDK/OfficeDev.microsoft-teams-library-js.nightly-backcompat'
      project: ISS
extends:
  template: v1/Office.Official.PipelineTemplate.yml@CustomPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-latest
      os: windows
    serviceTreeId: $(serviceTreeId)
    customBuildTags:
      - ES365AIMigrationTooling-Release-MOBR
    stages:
      - stage: Prod_Lockbox_Approval_Deployment
        displayName: Lockbox Approval/Deployment
        dependsOn: []
        templateContext:
          cloud: Public
          isProduction: true
          approval:
            workflow: lockbox
            scope:
              serviceGroupName: Platform
              subscriptionIds:
                - $(subscriptionId)
        jobs:
          - job: Agent_job
            condition: or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
            templateContext:
              type: releaseJob
              workflow: m365-custom
              inputs:
                - input: pipelineArtifact
                  pipeline: microsoft-teams-library-js-pipeline
                  artifactName: NPMFeed
                  targetPath: $(System.DefaultWorkingDirectory)/microsoft-teams-library-js-pipeline/NPMFeed
                - input: pipelineArtifact
                  pipeline: microsoft-teams-library-js-pipeline
                  artifactName: CDNFeed
                  targetPath: $(System.DefaultWorkingDirectory)/microsoft-teams-library-js-pipeline/CDNFeed
                - input: pipelineArtifact
                  pipeline: microsoft-teams-library-js-pipeline
                  artifactName: scripts
                  targetPath: $(System.DefaultWorkingDirectory)/microsoft-teams-library-js-pipeline/scripts
            steps:
              - task: PowerShell@2
                displayName: 'Validate nightly back-compat pipeline succeeded'
                inputs:
                  targetType: inline
                  script: |
                    $orgUrl = $env:SYSTEM_COLLECTIONURI
                    $project = $env:SYSTEM_TEAMPROJECT
                    $token = $env:SYSTEM_ACCESSTOKEN
                    $headers = @{ Authorization = "Bearer $token" }

                    # Query the latest completed run of the nightly back-compat pipeline on main
                    $pipelineName = "$(resources.pipeline.nightlyBackCompatPipeline.pipelineName)"
                    $runsUrl = "${orgUrl}${project}/_apis/build/builds?definitions=$(resources.pipeline.nightlyBackCompatPipeline.pipelineID)&statusFilter=completed&resultFilter=succeeded&branchName=refs/heads/main&`$top=1&api-version=7.0"

                    Write-Host "Checking latest nightly back-compat pipeline run ($pipelineName)..."
                    $response = Invoke-RestMethod -Uri $runsUrl -Headers $headers -Method Get

                    if ($response.count -eq 0) {
                      Write-Error "No successful runs found for the nightly back-compat pipeline. Releases require a passing nightly run."
                      exit 1
                    }

                    $latestRun = $response.value[0]
                    $finishTime = [DateTime]::Parse($latestRun.finishTime)
                    $hoursAgo = (Get-Date).ToUniversalTime().Subtract($finishTime).TotalHours

                    Write-Host "Latest successful run: #$($latestRun.buildNumber) finished $([math]::Round($hoursAgo, 1)) hours ago"

                    if ($hoursAgo -gt 48) {
                      Write-Error "Latest successful nightly back-compat run is more than 48 hours old ($([math]::Round($hoursAgo, 1))h). Please investigate nightly pipeline failures before releasing."
                      exit 1
                    }

                    Write-Host "##[section]Nightly back-compat pipeline validation passed."
                  pwsh: true
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              - task: prepare-deployment@1
                displayName: Prepare deployment
                inputs:
                  taskType: credentialFetchTaskAzureRM
                  armserviceconnection: $(serviceConnectionId)
                  subscriptionid: $(subscriptionId)
              - task: AssetRetention@3
                displayName: ARtifact Retention Orchestrator Workflow (ARROW)
                inputs:
                  ArrowServiceConnection: $(arrowServiceConnectionId)
                  IsShipped: true
              - task: NodeTool@0
                displayName: Use Node 18.x
                inputs:
                  versionSpec: 18.x
              - task: Npm@1
                displayName: Build NPM package for release
                inputs:
                  command: custom
                  workingDir: $(System.DefaultWorkingDirectory)/microsoft-teams-library-js-pipeline/NPMFeed
                  verbose: false
                  customCommand: pack
              - task: EsrpRelease@10
                displayName: Publish to npm (tag beta) - ESRP release
                inputs:
                  connectedservicename: '$(connectedServiceName)'
                  usemanagedidentity: true
                  keyvaultname: '$(keyVaultName)'
                  signcertname: '$(signCertName)'
                  clientid: '$(clientId)'
                  intent: 'PackageDistribution'
                  contenttype: 'npm'
                  contentsource: 'Folder'
                  folderlocation: '$(System.DefaultWorkingDirectory)/microsoft-teams-library-js-pipeline/NPMFeed'
                  waitforreleasecompletion: true
                  owners: $(owners)
                  approvers: $(approvers)
                  serviceendpointurl: '$(serviceEndpointUrl)'
                  mainpublisher: '$(mainPublisher)'
                  domaintenantid: '$(domainTenantId)'
                  productstate: 'Latest'
              - task: M365CdnAssetsUpload@3
                displayName: Push teams-js to M365 1CDN (Prod)
                inputs:
                  SourcePath: $(System.DefaultWorkingDirectory)/microsoft-teams-library-js-pipeline/CDNFeed/*
                  ConnectedServiceNameARM: $(serviceConnectionId)
                  ContainerName: teams-js
                  AdditionalArgumentsForBlobCopy: --overwrite=false --log-level=INFO --recursive
              - task: PowerShell@2
                displayName: View Published Package URLs
                inputs:
                  targetType: 'filePath'
                  filePath: 'microsoft-teams-library-js-pipeline/scripts/view-published-pkg-urls.ps1'
                  arguments: -PIPELINE_WORKSPACE $(System.DefaultWorkingDirectory)
