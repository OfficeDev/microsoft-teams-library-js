# This does all the steps for cloning both app sdk and app host sdk repos and building them, then configuring the app host.
# Can be reused for any additional e2e tests and then paired with a node script with different parameters for which type of e2e test needs to run.

parameters:
  - name: 'appHostGitPath'
    default: none
    type: string

steps:
  - checkout: self
  - checkout: ${{ parameters.appHostGitPath }}
    persistCredentials: true

  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Install Node.js'

  # Cache task is used to create a cache of files which won't change between jobs, task, or steps.
  # In this task below a unique identifier(fingerprint) is created for the cache name, usually it's
  #   'command_name | operating_system | lockfile'
  # in our case it is 'pnpm | "$(Agent.OS)" | $(AppHostingSdkProjectDirectory)/pnpm-lock.yaml'
  # and for the path is the directory which needs to be cached.
  # Here `node_modules` are cached which are dowloaded from the scoped/private registry to build the mono-repo.
  - task: Cache@2
    inputs:
      key: 'pnpm_v1 | "$(Agent.OS)" | $(AppHostingSdkProjectDirectory)/pnpm-lock.yaml'
      path: $(Pipeline.Workspace)/.pnpm-store
    displayName: Cache app host node_modules pnpm

  - task: Cache@2
    inputs:
      key: 'pnpm_v1 | "$(Agent.OS)" | $(ClientSdkProjectDirectory)/pnpm-lock.yaml'
      path: $(Pipeline.Workspace)/.pnpm-store
    displayName: Cache client sdk node_modules pnpm

  # Configure and authenticate the CFS-backed npm feed before Corepack prepares
  # pnpm to avoid public-registry access in isolated (CFSClean) pipelines.
  - script: |
      echo "registry=https://office.pkgs.visualstudio.com/ISS/_packaging/ISS_PublicPackages/npm/registry/" >> .npmrc
      echo "always-auth=true" >> .npmrc
    displayName: 'Configure CFS-compliant npm registry for client sdk'
    workingDirectory: '$(ClientSdkProjectDirectory)'

  - task: npmAuthenticate@0
    inputs:
      workingFile: '$(ClientSdkProjectDirectory)/.npmrc'

  - script: |
      corepack enable
      corepack prepare pnpm@9.0.6 --activate
      pnpm config set store-dir $(Pipeline.Workspace)/.pnpm-store
    displayName: 'Setup pnpm'
    env:
      COREPACK_NPM_REGISTRY: 'https://office.pkgs.visualstudio.com/ISS/_packaging/ISS_PublicPackages/npm/registry/'

  - task: npmAuthenticate@0
    inputs:
      workingFile: '$(AppHostingSdkProjectDirectory)/.npmrc'

  # Install dependencies, skipping Cypress's postinstall binary download.
  # CYPRESS_INSTALL_BINARY is set via the step env (not a bare shell assignment)
  # so that it is exported to the pnpm child process.
  - script: |
      rm -rf $(pnpm store path)
      sed -i '/"preinstall":/d' package.json
      pnpm install --frozen-lockfile
    displayName: Install app hosting dependencies
    workingDirectory: '$(AppHostingSdkProjectDirectory)'
    env:
      CYPRESS_INSTALL_BINARY: '0'

  - task: CodeQL3000Init@0
    inputs:
      Enabled: true

  - script: |
      pnpm build
    displayName: 'Build app hosting sdk'
    workingDirectory: '$(AppHostingSdkProjectDirectory)'

  - script: |
      pnpm install
    displayName: 'Install client sdk dependencies'
    workingDirectory: '$(ClientSdkProjectDirectory)'
    env:
      NEXT_TELEMETRY_DISABLED: '1'

  # Generate nuget.config for the Blazor test app at pipeline time so that:
  # 1. dotnet restore uses the CFS-backed ADO feed (CFSClean compliant)
  # 2. The file is NOT committed to the repo (avoids SSCA CFS0013 scanner errors
  #    and allows external contributors to build without it using default nuget.org)
  - script: |
      cat > $(ClientSdkProjectDirectory)/apps/blazor-test-app/nuget.config << 'EOF'
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="CFS-NuGet" value="https://office.pkgs.visualstudio.com/ISS/_packaging/ISS_PublicPackages/nuget/v3/index.json" />
        </packageSources>
      </configuration>
      EOF
    displayName: 'Generate Blazor nuget.config (CFS feed only)'

  - task: NuGetAuthenticate@1

  - script: |
      pnpm build-force-blazor
    displayName: 'Build client sdk'
    workingDirectory: '$(ClientSdkProjectDirectory)'
    env:
      NEXT_TELEMETRY_DISABLED: '1'

  - task: CmdLine@2
    displayName: 'Configure host machine'
    inputs:
      script: |
        sudo chmod -R 755 ./ 
        pnpm run setup
      workingDirectory: '$(AppHostingSdkProjectDirectory)'

  - task: CodeQL3000Finalize@0
    condition: always()
